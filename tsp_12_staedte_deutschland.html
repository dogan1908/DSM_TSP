<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSP 12 St&#228;dte - Uhr-Heuristik</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:-apple-system,'Segoe UI',sans-serif;padding:16px}
.wrap{display:flex;gap:0;flex-wrap:wrap;max-width:950px;margin:0 auto}
.map-side{flex:1.3;min-width:380px}
.panel{flex:1;min-width:280px;padding:8px 0 0 8px}
.city-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;justify-content:center}
.cb{padding:4px 10px;border-radius:6px;border:1.5px solid #aaa;background:#fff;color:#333;font:500 12px -apple-system,sans-serif;cursor:pointer;min-width:30px}
.cb:hover{background:#f5f5f5}
.cb.active{color:#fff;background:#534AB7;border-color:#534AB7}
.mlist{font:400 11px/1.8 'SF Mono',Consolas,monospace;color:#888;max-height:200px;overflow-y:auto;padding:8px 10px;background:#f8f8f6;border-radius:8px;margin-top:8px}
.m-yes{color:#0F6E56;font-weight:500}
.m-no{color:#A32D2D}
.srow{display:flex;gap:16px;margin:8px 0;font:400 13px -apple-system,sans-serif;color:#888}
.sv{font:500 14px -apple-system,sans-serif;color:#333}
.ctime{font:500 24px 'SF Mono',Consolas,monospace;color:#333;text-align:center;margin:6px 0 2px}
.csub{font:400 12px -apple-system,sans-serif;color:#888;text-align:center}
.chain{font:400 13px/1.6 -apple-system,sans-serif;color:#888;margin:10px 0;padding:10px 12px;background:#f8f8f6;border-radius:8px}
.chain b{font-weight:500;color:#333}
</style>
</head>
<body>
<div class="srow">
  <span>Matches: <span class="sv" id="mc">0</span></span>
  <span>Falsch-Positive: <span class="sv" id="fc">0</span></span>
</div>
<div class="wrap">
  <div class="map-side"><svg id="map" width="100%" viewBox="0 0 500 480"></svg></div>
  <div class="panel">
    <div class="city-row" id="btns"></div>
    <svg id="clock" width="220" height="220" viewBox="0 0 220 220" style="display:block;margin:0 auto"></svg>
    <div class="ctime" id="ct">&ndash;</div>
    <div class="csub" id="csub">Stadt anklicken</div>
    <div class="chain" id="chain"></div>
    <div class="mlist" id="mlist"></div>
  </div>
</div>
<script>
var C=[
  {x:340,y:300,n:'1'},{x:430,y:310,n:'2'},{x:420,y:215,n:'3'},
  {x:300,y:230,n:'4'},{x:245,y:165,n:'5'},{x:275,y:152,n:'6'},
  {x:195,y:275,n:'7'},{x:205,y:300,n:'8'},{x:230,y:360,n:'9'},
  {x:255,y:415,n:'10'},{x:325,y:410,n:'11'},{x:350,y:435,n:'12'}
];
var N=12,COL='#534AB7',MCOL='#D4537E';

function dd(a,b){return Math.hypot(C[a].x-C[b].x,C[a].y-C[b].y);}
function brg(a,b){var dx=C[b].x-C[a].x,dy=-(C[b].y-C[a].y);return(Math.atan2(dx,dy)*180/Math.PI+360)%360;}
function tc(d){d=((d%360)+360)%360;var h=Math.floor(d/30);if(!h)h=12;var m=Math.round((d/30-Math.floor(d/30))*60);if(m===60){h=h%12+1;m=0;}return h+':'+String(m).padStart(2,'0');}
function r5(d){return(Math.round(d/0.5/5)*5*0.5+360)%360;}

var doors=[],matches=[],selIdx=null;

function calcAll(){
  doors=[];
  for(var i=0;i<N;i++){
    var ds=[];
    for(var j=0;j<N;j++){
      if(i===j)continue;
      ds.push({to:j,d:Math.round(dd(i,j)*10)/10,deg:brg(i,j),degR:r5(brg(i,j))});
    }
    ds.sort(function(a,b){return a.d-b.d;});
    doors.push({ein:ds[0],aus:ds[1]});
  }
  matches=[];
  var ad=[];
  for(var i=0;i<N;i++){
    ad.push({c:i,t:'E',km:doors[i].ein.d,deg:doors[i].ein.degR,to:doors[i].ein.to});
    ad.push({c:i,t:'A',km:doors[i].aus.d,deg:doors[i].aus.degR,to:doors[i].aus.to});
  }
  for(var i=0;i<ad.length;i++){
    for(var j=i+1;j<ad.length;j++){
      var a=ad[i],b=ad[j];
      if(a.c===b.c)continue;
      if(Math.abs(a.km-b.km)>0.5)continue;
      var diff=Math.abs(a.deg-b.deg);if(diff>180)diff=360-diff;
      var dev=Math.abs(diff-180);
      if(dev<=5){
        var real=(a.to===b.c||b.to===a.c);
        matches.push({a:a,b:b,real:real,dev:dev});
      }
    }
  }
}

function buildChain(){
  var adj={};
  matches.forEach(function(m){
    if(!m.real)return;
    var k1=m.a.c,k2=m.b.c;
    if(!adj[k1])adj[k1]=[];
    if(!adj[k2])adj[k2]=[];
    if(adj[k1].indexOf(k2)<0)adj[k1].push(k2);
    if(adj[k2].indexOf(k1)<0)adj[k2].push(k1);
  });
  var endpoints=[];
  for(var k in adj){if(adj[k].length===1)endpoints.push(parseInt(k));}
  if(endpoints.length<2)return'Kette nicht eindeutig';
  var chain=[endpoints[0]];
  var visited={};visited[endpoints[0]]=true;
  while(true){
    var cur=chain[chain.length-1];
    var nbs=adj[cur]||[];
    var next=null;
    for(var i=0;i<nbs.length;i++){if(!visited[nbs[i]]){next=nbs[i];break;}}
    if(next===null)break;
    chain.push(next);visited[next]=true;
  }
  return chain.map(function(i){return C[i].n;}).join(' &#8594; ');
}

function drawMap(){
  var s='';
  var drawn={};
  for(var i=0;i<N;i++){
    [{d:doors[i].ein,sol:true},{d:doors[i].aus,sol:false}].forEach(function(e){
      var j=e.d.to;
      var k=Math.min(i,j)+'-'+Math.max(i,j)+'-'+(e.sol?1:0);
      if(drawn[k])return;drawn[k]=true;
      var a=C[i],b=C[j];
      var col=e.sol?'#1D9E75':'#D85A30';
      var w=e.sol?1.8:1;
      var op=e.sol?0.35:0.15;
      var dash=e.sol?'':'5 3';
      if(selIdx!==null){
        if(i===selIdx||j===selIdx){op=e.sol?0.7:0.4;w=e.sol?2.5:1.5;}
        else{op*=0.15;}
      }
      s+='<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+col+'" stroke-width="'+w+'" opacity="'+op+'"'+(dash?' stroke-dasharray="'+dash+'"':'')+'/>';
    });
  }
  var me={};
  matches.forEach(function(m){
    var k=Math.min(m.a.c,m.b.c)+'-'+Math.max(m.a.c,m.b.c);
    me[k]=m;
  });
  for(var k in me){
    var m=me[k];
    var a=C[m.a.c],b=C[m.b.c];
    var col=m.real?MCOL:'#E24B4A';
    var op=m.real?0.5:0.35;
    var w=m.real?3.5:2;
    if(selIdx!==null&&m.a.c!==selIdx&&m.b.c!==selIdx){op*=0.12;}
    s+='<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+col+'" stroke-width="'+w+'" opacity="'+op+'"'+(m.real?'':' stroke-dasharray="4 3"')+'/>';
  }
  C.forEach(function(c,i){
    var op=(selIdx===null||selIdx===i)?1:0.2;
    var r=selIdx===i?18:14;
    s+='<circle cx="'+c.x+'" cy="'+c.y+'" r="'+r+'" fill="'+COL+'" opacity="'+op+'" style="cursor:pointer" onclick="sel('+i+')"/>';
    s+='<text x="'+c.x+'" y="'+(c.y+1)+'" text-anchor="middle" dominant-baseline="central" style="font:500 '+(selIdx===i?13:11)+'px sans-serif;fill:#fff;opacity:'+op+';pointer-events:none">'+c.n+'</text>';
  });
  s+='<line x1="15" y1="465" x2="40" y2="465" stroke="#1D9E75" stroke-width="2"/>';
  s+='<text x="45" y="469" style="font:400 10px sans-serif;fill:#aaa">Eingang</text>';
  s+='<line x1="110" y1="465" x2="135" y2="465" stroke="#D85A30" stroke-width="1" stroke-dasharray="5 3"/>';
  s+='<text x="140" y="469" style="font:400 10px sans-serif;fill:#aaa">Ausgang</text>';
  s+='<line x1="210" y1="465" x2="235" y2="465" stroke="'+MCOL+'" stroke-width="3.5" opacity=".5"/>';
  s+='<text x="240" y="469" style="font:400 10px sans-serif;fill:#aaa">Match</text>';
  document.getElementById('map').innerHTML=s;
}

function drawBtns(){
  var h='';
  C.forEach(function(c,i){
    h+='<button class="cb'+(selIdx===i?' active':'')+'" onclick="sel('+i+')">'+c.n+'</button>';
  });
  document.getElementById('btns').innerHTML=h;
}

function drawClock(){
  var cx=110,cy=110,r=90;
  var s='';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#ddd" stroke-width="0.5"/>';
  for(var i=0;i<60;i++){
    var a=(i/60)*Math.PI*2-Math.PI/2;
    var major=i%5===0;
    s+='<line x1="'+(cx+Math.cos(a)*(r-(major?10:3)))+'" y1="'+(cy+Math.sin(a)*(r-(major?10:3)))+'" x2="'+(cx+Math.cos(a)*(r-1))+'" y2="'+(cy+Math.sin(a)*(r-1))+'" stroke="'+(major?'#999':'#ddd')+'" stroke-width="'+(major?1.2:0.4)+'"/>';
  }
  for(var i=1;i<=12;i++){
    var a=(i/12)*Math.PI*2-Math.PI/2;
    s+='<text x="'+(cx+Math.cos(a)*(r-20))+'" y="'+(cy+Math.sin(a)*(r-20))+'" text-anchor="middle" dominant-baseline="central" style="font:500 12px sans-serif;fill:#999">'+i+'</text>';
  }
  if(selIdx!==null){
    var d=doors[selIdx];
    var aE=(d.ein.degR-90)*Math.PI/180;
    var aA=(d.aus.degR-90)*Math.PI/180;
    s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+Math.cos(aE)*(r-25))+'" y2="'+(cy+Math.sin(aE)*(r-25))+'" stroke="'+COL+'" stroke-width="4" stroke-linecap="round"/>';
    s+='<circle cx="'+(cx+Math.cos(aE)*(r-25))+'" cy="'+(cy+Math.sin(aE)*(r-25))+'" r="5" fill="'+COL+'"/>';
    s+='<text x="'+(cx+Math.cos(aE)*(r-10))+'" y="'+(cy+Math.sin(aE)*(r-10))+'" text-anchor="middle" dominant-baseline="central" style="font:500 10px sans-serif;fill:'+COL+'">'+d.ein.d+'</text>';
    s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+Math.cos(aA)*(r-35))+'" y2="'+(cy+Math.sin(aA)*(r-35))+'" stroke="'+COL+'" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 3" opacity=".45"/>';
    s+='<circle cx="'+(cx+Math.cos(aA)*(r-35))+'" cy="'+(cy+Math.sin(aA)*(r-35))+'" r="4" fill="'+COL+'" opacity=".45"/>';
    s+='<text x="'+(cx+Math.cos(aA)*(r-10))+'" y="'+(cy+Math.sin(aA)*(r-10)+14)+'" text-anchor="middle" dominant-baseline="central" style="font:400 10px sans-serif;fill:'+COL+';opacity:.5">'+d.aus.d+'</text>';
    document.getElementById('ct').textContent=tc(d.ein.degR)+' / '+tc(d.aus.degR);
    document.getElementById('ct').style.color=COL;
    document.getElementById('csub').textContent='Stadt '+C[selIdx].n+': Ein\u2192'+C[d.ein.to].n+' ('+d.ein.d+') | Aus\u2192'+C[d.aus.to].n+' ('+d.aus.d+')';
  } else {
    document.getElementById('ct').textContent='\u2013';
    document.getElementById('ct').style.color='#333';
    document.getElementById('csub').textContent='Stadt anklicken';
  }
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="3.5" fill="'+COL+'"/>';
  document.getElementById('clock').innerHTML=s;
}

function sel(i){selIdx=(selIdx===i)?null:i;render();}

function render(){
  drawMap();drawBtns();drawClock();
  var mc=0,fc=0,h='';
  matches.forEach(function(m){
    var cls=m.real?'m-yes':'m-no';
    h+='<div class="'+cls+'">'+C[m.a.c].n+'-'+m.a.t+' \u2194 '+C[m.b.c].n+'-'+m.b.t+' ('+m.a.km+', \u0394'+m.dev.toFixed(0)+'\u00b0) '+(m.real?'\u2705':'\u26a0\ufe0f')+'</div>';
    if(m.real)mc++;else fc++;
  });
  document.getElementById('mlist').innerHTML=h;
  document.getElementById('mc').textContent=mc;
  document.getElementById('fc').textContent=fc;
  document.getElementById('chain').innerHTML='<b>Gefundene Kette:</b> '+buildChain();
}

calcAll();render();
</script>
</body>
</html>
